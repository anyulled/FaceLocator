name: Infra Manual

on:
  workflow_dispatch:
    inputs:
      run_plan:
        description: "Run terraform plan after validate"
        required: false
        default: false
        type: boolean

concurrency:
  group: infra-manual-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'eu-west-1' }}

jobs:
  infra-manual:
    name: infra-manual
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.14.0

      - name: Package Lambda artifacts
        run: bash scripts/package-lambdas.sh

      - name: Check Terraform formatting
        run: terraform fmt -check -recursive infra

      - name: Terraform init
        run: terraform -chdir=infra init -backend=false

      - name: Terraform validate
        run: terraform -chdir=infra validate

      - name: Configure AWS credentials with OIDC
        if: ${{ inputs.run_plan && secrets.AWS_ROLE_TO_ASSUME != '' }}
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          role-session-name: github-actions-infra-plan

      - name: Configure AWS credentials with access keys
        if: ${{ inputs.run_plan && secrets.AWS_ROLE_TO_ASSUME == '' && secrets.AWS_ACCESS_KEY_ID != '' && secrets.AWS_SECRET_ACCESS_KEY != '' }}
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: ${{ env.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}

      - name: Terraform plan
        if: ${{ inputs.run_plan }}
        run: |
          aws sts get-caller-identity >/dev/null
          terraform -chdir=infra plan -input=false -lock=false -var-file=terraform.tfvars.example
