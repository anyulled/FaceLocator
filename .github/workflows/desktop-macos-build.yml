name: Desktop macOS Build

on:
  pull_request:
    paths:
      - 'apps/macos-uploader/**'
  push:
    branches:
      - main
    paths:
      - 'apps/macos-uploader/**'
  workflow_dispatch:

concurrency:
  group: desktop-macos-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  desktop-macos-build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/macos-uploader/src-tauri -> target

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build desktop app
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: apps/macos-uploader

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v7
        with:
          name: face-locator-desktop-macos-arm64-${{ github.sha }}
          path: |
            apps/macos-uploader/src-tauri/target/release/bundle/**/*.app
            apps/macos-uploader/src-tauri/target/release/bundle/**/*.dmg
            apps/macos-uploader/src-tauri/target/release/bundle/**/*.zip
          if-no-files-found: error
          retention-days: 7
