version: 1
frontend:
  phases:
    preBuild:
      commands:
        - corepack enable
        - corepack prepare pnpm@10 --activate
        - pnpm install --frozen-lockfile
        - |
          cat > .env.production <<'EOF'
          AWS_REGION=${AWS_REGION}
          FACE_LOCATOR_AWS_UPLOAD_MODE=${FACE_LOCATOR_AWS_UPLOAD_MODE}
          FACE_LOCATOR_REPOSITORY_TYPE=${FACE_LOCATOR_REPOSITORY_TYPE}
          FACE_LOCATOR_SELFIES_BUCKET=${FACE_LOCATOR_SELFIES_BUCKET}
          FACE_LOCATOR_EVENT_PHOTOS_BUCKET=${FACE_LOCATOR_EVENT_PHOTOS_BUCKET}
          DATABASE_SECRET_NAME=${DATABASE_SECRET_NAME}
          FACE_LOCATOR_DATABASE_SECRET_NAME=${FACE_LOCATOR_DATABASE_SECRET_NAME}
          FACE_LOCATOR_PUBLIC_BASE_URL=${FACE_LOCATOR_PUBLIC_BASE_URL}
          COGNITO_USER_POOL_ID=${COGNITO_USER_POOL_ID}
          COGNITO_APP_CLIENT_ID=${COGNITO_APP_CLIENT_ID}
          COGNITO_ISSUER=${COGNITO_ISSUER}
          COGNITO_DOMAIN=${COGNITO_DOMAIN}
          COGNITO_DOMAIN_PREFIX=${COGNITO_DOMAIN_PREFIX}
          NEXT_PUBLIC_COGNITO_USER_POOL_ID=${COGNITO_USER_POOL_ID}
          NEXT_PUBLIC_COGNITO_APP_CLIENT_ID=${COGNITO_APP_CLIENT_ID}
          NEXT_PUBLIC_COGNITO_ISSUER=${COGNITO_ISSUER}
          NEXT_PUBLIC_COGNITO_DOMAIN=${COGNITO_DOMAIN}
          NEXT_PUBLIC_COGNITO_DOMAIN_PREFIX=${COGNITO_DOMAIN_PREFIX}
          EOF
    build:
      commands:
        - pnpm build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - .pnpm-store/**/*
      - node_modules/**/*
      - .next/cache/**/*
