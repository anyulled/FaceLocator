name: Live E2E

on:
  pull_request:

concurrency:
  group: e2e-live-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'eu-west-1' }}
  FACE_LOCATOR_AWS_UPLOAD_MODE: aws
  FACE_LOCATOR_REPOSITORY_TYPE: postgres
  FACE_LOCATOR_SELFIES_BUCKET: ${{ vars.FACE_LOCATOR_SELFIES_BUCKET }}
  FACE_LOCATOR_EVENT_PHOTOS_BUCKET: ${{ vars.FACE_LOCATOR_EVENT_PHOTOS_BUCKET }}

jobs:
  live-e2e:
    name: live-e2e
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure AWS credentials with OIDC
        if: ${{ env.AWS_ROLE_TO_ASSUME != '' }}
        env:
          AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          role-session-name: github-actions-live-e2e

      - name: Configure AWS credentials with access keys
        if: ${{ env.AWS_ROLE_TO_ASSUME == '' && env.AWS_ACCESS_KEY_ID != '' && env.AWS_SECRET_ACCESS_KEY != '' }}
        env:
          AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: ${{ env.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}

      - name: Validate live E2E configuration
        run: |
          test -n "${AWS_REGION}"
          test -n "${FACE_LOCATOR_SELFIES_BUCKET}"
          test -n "${FACE_LOCATOR_EVENT_PHOTOS_BUCKET}"
          aws sts get-caller-identity >/dev/null

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Run live Playwright suites
        run: |
          browser_exit=0
          event_exit=0

          pnpm test:e2e tests/e2e/browser.spec.ts --project=chromium || browser_exit=$?
          pnpm test:e2e tests/e2e/event-processing.spec.ts --project=chromium || event_exit=$?

          if [ "${browser_exit}" -ne 0 ] || [ "${event_exit}" -ne 0 ]; then
            echo "browser_exit=${browser_exit}"
            echo "event_exit=${event_exit}"
            exit 1
          fi

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore

      - name: Upload Playwright test results
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-test-results
          path: test-results/
          if-no-files-found: ignore
