version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 8
    labels:
      - "dependencies"
      - "npm"
    groups:
      next-react:
        patterns:
          - "next"
          - "react"
          - "react-dom"
          - "eslint-config-next"
      aws-sdk:
        patterns:
          - "@aws-sdk/*"
      testing:
        patterns:
          - "vitest"
          - "@playwright/test"
          - "@testing-library/*"
          - "jsdom"
      types:
        patterns:
          - "@types/*"
          - "typescript"
      tooling:
        patterns:
          - "eslint"
          - "dotenv"
          - "portless"
          - "pnpm"

  - package-ecosystem: "terraform"
    directory: "/infra"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 4
    labels:
      - "dependencies"
      - "terraform"
    groups:
      terraform-providers:
        patterns:
          - "*"
